services:
  vidzilla-bot:
    image: python:3.11-slim
    container_name: vidzilla-bot
    working_dir: /app
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      BOT_MODE: ${BOT_MODE:-polling}
      PORT: ${PORT:-8000}
      HOST: ${HOST:-0.0.0.0}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      MONGODB_URI: ${MONGODB_URI:-}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-}
      MONGODB_USERS_COLLECTION: ${MONGODB_USERS_COLLECTION:-users}
      ADMIN_IDS: ${ADMIN_IDS:-}
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && python bot.py"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    restart: unless-stopped
