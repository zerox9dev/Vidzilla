services:
  vidzilla-bot:
    image: python:3.11-slim
    container_name: vidzilla-bot
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && python bot.py"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    restart: unless-stopped
